name: 🔭 Frontend Analysis

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: chmod +x scripts/analyze-frontend.sh
      - run: npm run analyze:ci
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-analysis-report
          path: report.json
          retention-days: 30
      - if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('report.json')) return;
            const r = JSON.parse(fs.readFileSync('report.json','utf8'));
            const e = r.score>=90?'✨':r.score>=70?'⚡':'⚠️';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ${e} Frontend Analysis — Score: ${r.score}/100\n\n| | Resultado |\n|---|---|\n| 🔴 Erros | ${r.summary.errors} |\n| 🟡 Avisos | ${r.summary.warnings} |\n| ⏱ Tempo | ${r.summary.elapsed_seconds}s |\n\n${r.summary.errors>0?'> ❌ Corrija os erros.':'> ✅ Pronto para merge.'}`
            });
